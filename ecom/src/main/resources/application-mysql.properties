spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ECOM?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Keep production/shared databases under explicit application control.
app.catalog.seed-enabled=${CATALOG_SEED_ENABLED:false}
